<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Колесо открытий</title>
<style>
*{box-sizing:border-box}
body{margin:0;background:#020411;color:#fff;font-family:Trebuchet MS,Arial,sans-serif;min-height:100dvh;display:grid;place-items:center;overflow:hidden}
.page{width:100vw;height:100dvh;display:grid;place-items:center}
.stage{position:relative;aspect-ratio:1672/941;width:min(100vw,calc(100dvh * 1672 / 941));overflow:hidden;border-radius:2.5%;background:radial-gradient(circle at 62% 58%,#102454 0 15%,#06071b 48%,#01030b 100%);box-shadow:inset 0 0 0 .35vw #082041,inset 0 0 2vw #0ff,0 0 2vw #000}
.stage:before{content:"";position:absolute;inset:1.5%;border:.16vw solid #17345d;border-radius:2.2%;box-shadow:inset 0 0 1.6vw #000,0 0 1vw #ff7a00}
.stars{position:absolute;inset:0;background-image:radial-gradient(#fff 0 1px,transparent 1.5px),radial-gradient(#ff9e21 0 1px,transparent 1.8px),radial-gradient(#13d8ff 0 1px,transparent 1.8px);background-size:9% 11%,13% 17%,17% 19%;opacity:.75}
h1{position:absolute;top:4%;left:22%;margin:0;font-size:clamp(32px,6vw,94px);letter-spacing:.05em;color:#ffe5a5;text-shadow:.25vw .45vw #17132b,0 0 1vw #ffb13b;transform:rotate(-1deg)}
.planet{position:absolute;left:11%;top:7%;font-size:6vw;filter:drop-shadow(0 0 1vw #d34cff)}
.bubble{position:absolute;left:7%;top:38%;font-size:clamp(14px,1.8vw,30px);line-height:1.45;padding:1.4% 2.1%;border:.16vw solid #26e8ff;border-radius:1.8vw;color:#ffecca;background:#08152ccc;box-shadow:0 0 1vw #16edff}
.bubble b{color:#2ce8f0}
.friends{position:absolute;left:4%;bottom:10%;font-size:clamp(38px,6vw,96px);letter-spacing:-.25em;line-height:.86;filter:drop-shadow(0 .5vw .5vw #000) drop-shadow(0 0 .8vw #44e6ff)}
.wheelWrap{position:absolute;left:61.603%;top:54.835%;width:40.67%;aspect-ratio:1;transform:translate(-50%,-50%)}
.rim{position:absolute;inset:-5%;border-radius:50%;background:radial-gradient(circle,transparent 60%,#071529 61% 68%,#00cfff 69%,#261454 70% 73%,#ff8b15 74%,#050817 76%);box-shadow:0 0 2vw #129cff,0 0 2vw #ff40db}
.rotor{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from -36deg,#0e7591 0 72deg,#9a3457 72deg 144deg,#43228d 144deg 216deg,#117363 216deg 288deg,#884229 288deg 360deg);box-shadow:inset 0 0 2vw #fff4,inset 0 0 4vw #000;transition-property:transform;transition-duration:4800ms;transition-timing-function:cubic-bezier(.12,.8,.08,1);will-change:transform}
.rotor:after{content:"";position:absolute;inset:0;border-radius:50%;background:repeating-conic-gradient(from -36deg,transparent 0 70deg,#ffffff33 70deg 72deg)}
.label{position:absolute;left:38%;top:4%;width:24%;height:46%;transform-origin:50% 100%;display:flex;align-items:flex-start;justify-content:center;text-align:center;z-index:2}
.label span{margin-top:8%;font-weight:800;font-size:clamp(10px,1.15vw,21px);line-height:1.15;text-shadow:0 0 .5vw #000,0 .12vw .2vw #000;transition:filter .35s,opacity .35s}
.label em{display:block;font-size:2em;font-style:normal;margin-bottom:.25em}
.blurred{filter:blur(6.5px);opacity:.28}
.spinning{filter:blur(11px);opacity:.14}
.clear{filter:none;opacity:1}
.star{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:25%;aspect-ratio:1;border-radius:50%;border:.3vw solid #11314e;background:radial-gradient(circle,#ff9b13 0 24%,#2b1205 25% 58%,#050815 59%);font-size:clamp(44px,7vw,120px);cursor:pointer;color:#ffd33e;text-shadow:0 0 .8vw #fff,0 0 1.5vw #ff7a00;box-shadow:0 0 1vw #00d4ff,inset 0 0 1vw #ff7a00;z-index:5}
.star:disabled{cursor:wait}
.pointer{position:absolute;left:50%;top:-2%;transform:translateX(-50%) rotate(2.141deg);font-size:5vw;color:#ff9b1b;text-shadow:0 0 .3vw #fff,0 0 1vw #ff5a00;z-index:6}
.card{position:absolute;left:6%;top:24%;width:27%;padding:1.6%;border-radius:1.5vw;background:#ffffff33;color:#fff;border:.18vw solid #ffe68a;backdrop-filter:blur(10px);box-shadow:0 0 1.4vw #ff8a00;font-size:clamp(14px,1.5vw,26px)}
.card small{display:block;color:#8ef6ff;margin-bottom:.5em}
.card strong{color:#fff3c7}
.confetti{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.confetti i{position:absolute;left:var(--x);top:var(--y);width:.8vw;height:.35vw;background:var(--c);border-radius:2px;animation:pop 1.1s ease-out forwards}
@keyframes pop{to{transform:translate(var(--dx),var(--dy)) rotate(var(--r));opacity:0}}
@media(max-width:700px){
.stage{width:178vw;max-width:none;transform:translateX(-27vw)}
h1{font-size:9vw;left:25%;top:3%}
.bubble,.friends,.planet{display:none}
.wheelWrap{width:58%;left:62%;top:57%}
.card{left:33%;top:80%;width:32%;font-size:3.2vw;background:#06152bee}
.pointer{font-size:10vw}
.label span{font-size:2.1vw}
.star{font-size:12vw}
}
@media(prefers-reduced-motion:reduce){
.rotor{transition-duration:80ms!important}
.confetti i{animation-duration:.25s}
}
</style>
</head>
<body>
<main class="page">
<section class="stage" aria-label="Колесо открытий">
<div class="stars"></div>
<h1>КОЛЕСО ОТКРЫТИЙ</h1>
<div class="planet">🪐</div>
<div class="bubble">✦Колесо открытий<br><b>поможет лучше узнать<br>свои сильные стороны!</b></div>
<div class="friends">🟣 🟢 🔵 🟣<br>🟠 🔴 🔵</div>
<div class="wheelWrap">
<div class="rim"></div>
<div id="rotor" class="rotor"></div>
<button id="star" class="star" aria-label="Запустить колесо">⭐</button>
<div class="pointer">▼</div>
</div>
<aside id="card" class="card" hidden></aside>
<div id="confetti" class="confetti" aria-hidden="true"></div>
</section>
</main>

<script>
const POINTER_ANGLE=2.141;
const SLICE_ANGLE=72;
const SPIN_DURATION=4800;
const QUESTIONS=[
{emoji:"🚀",text:"Я начинаю волноваться, когда вижу…"},
{emoji:"💛",text:"Я чувствую себя виноватым, если…"},
{emoji:"⭐️",text:"Я радуюсь, когда у меня получается…"},
{emoji:"🌸",text:"Мне становится спокойно, если я…"},
{emoji:"⚡️",text:"Я чувствую себя сильным, когда…"}
];

const normalizeAngle=a=>((a%360)+360)%360;

function secureRandomInt(maxExclusive){
  const limit=Math.floor(0x100000000/maxExclusive)*maxExclusive;
  const buf=new Uint32Array(1);
  do{crypto.getRandomValues(buf)}while(buf[0]>=limit);
  return buf[0]%maxExclusive;
}

function computeTargetRotation(currentRotation,winnerIndex,fullTurns){
  const desiredAngle=normalizeAngle(POINTER_ANGLE-winnerIndex*SLICE_ANGLE);
  const extraAngle=normalizeAngle(desiredAngle-normalizeAngle(currentRotation));
  return currentRotation+fullTurns*360+extraAngle;
}

function sectorUnderPointer(rotation){
  return normalizeAngle(Math.round(normalizeAngle(POINTER_ANGLE-normalizeAngle(rotation))/SLICE_ANGLE))%5;
}

const rotor=document.querySelector("#rotor");
const star=document.querySelector("#star");
const card=document.querySelector("#card");
const confetti=document.querySelector("#confetti");

let phase="ready";
let currentRotation=0;
let pendingWinner=null;
let pendingTarget=0;
let fallback=0;
const reduced=matchMedia("(prefers-reduced-motion: reduce)");

function renderLabels(){
  rotor.innerHTML=QUESTIONS.map((q,i)=>`
    <div class="label" style="transform:rotate(${i*72}deg) translateY(-35%)">
      <span class="blurred" data-i="${i}">
        <em>${q.emoji}</em>${q.text}
      </span>
    </div>
  `).join("");
}

function setTextState(winner=null){
  document.querySelectorAll(".label span").forEach(el=>{
    el.className=phase==="spinning"
      ?"spinning"
      :(phase==="result"&&Number(el.dataset.i)===winner?"clear":"blurred");
  });
}

function finish(){
  if(phase!=="spinning")return;
  clearTimeout(fallback);
  currentRotation=pendingTarget;
  const verified=sectorUnderPointer(currentRotation);
  const winner=verified===pendingWinner?pendingWinner:verified;
  phase="result";
  star.disabled=false;
  setTextState(winner);
  card.hidden=false;
  card.innerHTML=`<small>Выпал вопрос</small><strong>${QUESTIONS[winner].emoji} ${QUESTIONS[winner].text}</strong>`;
  burst();
  ding();
}

function spin(){
  if(phase==="spinning")return;
  phase="spinning";
  star.disabled=true;
  card.hidden=true;
  confetti.innerHTML="";
  setTextState();
  pendingWinner=secureRandomInt(5);
  const fullTurns=5+secureRandomInt(3);
  pendingTarget=computeTargetRotation(currentRotation,pendingWinner,fullTurns);
  requestAnimationFrame(()=>{
    rotor.style.transform=`rotate(${pendingTarget}deg) scaleY(.98235)`;
  });
  fallback=setTimeout(finish,(reduced.matches?80:SPIN_DURATION)+450);
}

function burst(){
  confetti.innerHTML=Array.from({length:32},()=>`
    <i style="
      --x:${42+secureRandomInt(22)}%;
      --y:${25+secureRandomInt(20)}%;
      --dx:${-90+secureRandomInt(181)}px;
      --dy:${-130+secureRandomInt(110)}px;
      --r:${secureRandomInt(360)}deg;
      --c:${["#00d8ff","#ff8a00","#ff4fd8","#ffe68a","#8cff6a"][secureRandomInt(5)]};
    "></i>
  `).join("");
}

function ding(){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    const ctx=new AC();
    [660,990].forEach((freq,i)=>{
      const o=ctx.createOscillator();
      const g=ctx.createGain();
      o.frequency.value=freq;
      o.type="sine";
      g.gain.setValueAtTime(.0001,ctx.currentTime+i*.08);
      g.gain.exponentialRampToValueAtTime(.08,ctx.currentTime+i*.08+.02);
      g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+i*.08+.18);
      o.connect(g).connect(ctx.destination);
      o.start(ctx.currentTime+i*.08);
      o.stop(ctx.currentTime+i*.08+.2);
    });
  }catch(e){}
}

rotor.addEventListener("transitionend",e=>{
  if(e.propertyName==="transform")finish();
});

star.addEventListener("click",spin);
renderLabels();
</script>
</body>
</html>
